services:

  orbd:
    image: eclipse-temurin:8-jre
    container_name: corba_orbd
    command: orbd -ORBInitialPort 900 -ORBInitialHost 0.0.0.0 -defaultdb /orbd_db
    volumes:
      - orbd_db:/orbd_db
    ports:
      - "900:900"
    networks:
      corba_net:
        aliases:
          - orbd
    healthcheck:
      test: ["CMD", "sh", "-c", "ps aux | grep orbd | grep -v grep"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 10s

  server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: corba_pdf_server
    depends_on:
      orbd:
        condition: service_healthy
    ports:
      - "1050:1050"
    volumes:
      - pdf_output:/tmp/corba_pdf_output
    networks:
      corba_net:
        aliases:
          - server
    restart: on-failure
    healthcheck:
      test: ["CMD", "sh", "-c", "ps aux | grep PDFServer | grep -v grep"]
      interval: 8s
      timeout: 5s
      retries: 10
      start_period: 15s

  bridge:
    build:
      context: .
      dockerfile: Dockerfile.bridge
    container_name: corba_bridge
    depends_on:
      orbd:
        condition: service_healthy
      server:
        condition: service_healthy
    environment:
      - CORBA_HOST=orbd
      - CORBA_PORT=900
    ports:
      - "9090:8080"
    volumes:
      - pdf_output:/tmp/corba_pdf_output
    networks:
      corba_net:
        aliases:
          - bridge
    restart: on-failure

  viewer:
    image: nginx:alpine
    container_name: corba_html_viewer
    depends_on:
      - bridge
    ports:
      - "8090:80"
    volumes:
      - ./html-viewer:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - corba_net
    restart: unless-stopped

volumes:
  orbd_db:
  pdf_output:

networks:
  corba_net:
    driver: bridge
